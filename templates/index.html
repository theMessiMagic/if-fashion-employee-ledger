<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ledger v24</title>
</head>
<body class="bg-slate-100 p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-black mb-6 text-center text-slate-800 uppercase italic">Ledger <span class="text-blue-600 underline">v24</span></h1>
        
        <form action="/add_labour" method="POST" class="bg-white p-6 rounded-2xl shadow-xl mb-8 flex gap-4 border-b-8 border-blue-600">
            <input type="text" name="name" placeholder="NAME" class="flex-1 border-2 p-3 rounded-xl uppercase font-bold outline-none" required>
            <select name="group" class="border-2 p-3 rounded-xl font-bold">
                <option value="A">Group A</option>
                <option value="B">Group B</option>
            </select>
            <select name="mc" class="border-2 p-3 rounded-xl font-bold">
                {% for i in range(1, 5) %}<option value="{{i}}">{{i}}</option>{% endfor %}
            </select>
            <button class="bg-blue-600 text-white px-8 rounded-xl font-bold hover:bg-blue-700">ADD</button>
        </form>

        <div class="grid grid-cols-2 gap-8">
            {% for g in ['A', 'B'] %}
            <div>
                <h2 class="text-xl font-black mb-4 {{'text-blue-600' if g=='A' else 'text-red-600'}} underline uppercase text-center font-bold">GROUP {{g}}</h2>
                {% for l in labours if l.group == g %}
                <div class="bg-white p-4 rounded-xl shadow mb-3 flex justify-between items-center border-r-4 {{'border-blue-400' if g=='A' else 'border-red-400'}} hover:scale-105 transition-all">
                    <a href="/notebook/{{l.id}}" class="font-bold text-slate-700 flex-1 uppercase tracking-tight">👤 {{l.name}} <span class="text-xs text-slate-400 ml-2 font-mono">MC:{{l.home_mc}}</span></a>
                    <a href="/delete_labour/{{l.id}}" class="text-red-200" onclick="return confirm('Delete?')">🗑️</a>
                </div>
                {% endfor %}
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
